# ============================================================
# Pharma MMM Agent — Master Configuration
# ============================================================
# Edit channel priors, model settings, and agent behaviour here.
# No need to touch the Python code for routine adjustments.

# ── LLM settings ────────────────────────────────────────────
llm:
  provider: anthropic       # openai | anthropic
  model: claude-sonnet-4-6  # claude-sonnet-4-6 | gpt-4o
  temperature: 0.1          # low temp = consistent, analytical responses
  max_tokens: 4096

# ── Data settings ───────────────────────────────────────────
data:
  weekly_path: data/raw/mmm_weekly.csv
  monthly_path: data/raw/mmm_monthly.csv
  default_freq: weekly      # weekly | monthly
  outcome_col: scripts_written
  date_col: date

# ── Channel definitions ─────────────────────────────────────
# adstock_decay : carryover rate (0=no carryover, 1=full carryover)
# saturation    : diminishing returns (lower=faster saturation)
# prior_roi     : expected ROI prior for Bayesian model
# channel_type  : hcp | dtc

channels:
  rep_visits:
    adstock_decay: 0.60
    saturation: 0.55
    prior_roi: 0.38
    channel_type: hcp
    label: "Field Rep Visits"

  medical_congress:
    adstock_decay: 0.75
    saturation: 0.45
    prior_roi: 0.52
    channel_type: hcp
    label: "Medical Congress & Symposia"

  journal_advertising:
    adstock_decay: 0.50
    saturation: 0.65
    prior_roi: 0.22
    channel_type: hcp
    label: "Journal Advertising"

  hcp_email:
    adstock_decay: 0.35
    saturation: 0.80
    prior_roi: 0.18
    channel_type: hcp
    label: "HCP Email Campaigns"

  hcp_digital:
    adstock_decay: 0.40
    saturation: 0.70
    prior_roi: 0.28
    channel_type: hcp
    label: "HCP Programmatic Digital"

  speaker_programs:
    adstock_decay: 0.70
    saturation: 0.50
    prior_roi: 0.45
    channel_type: hcp
    label: "Speaker Bureau Programs"

  samples_coupons:
    adstock_decay: 0.55
    saturation: 0.60
    prior_roi: 0.33
    channel_type: hcp
    label: "Samples & Co-pay Coupons"

  dtc_tv:
    adstock_decay: 0.50
    saturation: 0.75
    prior_roi: 0.20
    channel_type: dtc
    label: "DTC Television"

  dtc_digital:
    adstock_decay: 0.38
    saturation: 0.72
    prior_roi: 0.25
    channel_type: dtc
    label: "DTC Digital & Social"

  dtc_ooh:
    adstock_decay: 0.45
    saturation: 0.68
    prior_roi: 0.15
    channel_type: dtc
    label: "Out-of-Home Advertising"

  patient_email:
    adstock_decay: 0.30
    saturation: 0.82
    prior_roi: 0.16
    channel_type: dtc
    label: "Patient CRM Email"

  patient_advocacy:
    adstock_decay: 0.65
    saturation: 0.55
    prior_roi: 0.35
    channel_type: dtc
    label: "Patient Advocacy Partnerships"

# ── OLS model settings ──────────────────────────────────────
ols_model:
  fit_intercept: true
  seasonality_dummies: true   # adds month dummies as controls
  congress_control: true      # adds congress_week/month as control
  competitor_control: true    # adds competitor_spend as control (expected negative coef)
  price_control: true         # adds price_index as control (expected negative coef)
  normalize_spend: true       # scale spend before fitting
  ridge_alpha: 1.0            # regularisation strength; lower = less shrinkage
  prior_contribution_weight: 0.15  # fraction of total contribution reserved for
                                   # channels the model cannot separately identify;
                                   # distributed by prior_roi — set 0 to disable

# ── Bayesian model settings ─────────────────────────────────
bayesian_model:
  draws: 2000
  tune: 1000
  chains: 4
  target_accept: 0.90
  prior_sigma: 0.15           # tightness of ROI priors

# ── Budget optimiser settings ───────────────────────────────
optimizer:
  total_budget_multipliers: [0.80, 0.90, 1.00, 1.10, 1.20]
  min_channel_share: 0.02           # portfolio floor: no channel < 2% of total budget
  max_channel_share: 0.35           # portfolio ceiling: no channel > 35% of total budget
  max_spend_increase_factor: 2.5    # per-channel corridor: cannot exceed 2.5× current spend
  max_spend_decrease_factor: 0.5    # per-channel corridor: cannot fall below 50% of current spend
  # Corridors model operational reality: you can't overnight 10× a speaker bureau
  # (limited KOL capacity) or cut DTC TV 95% in one planning cycle (contracts, SOV).
  max_territory_increase_factor: 1.30  # territory budget can grow max 30% per planning cycle
  max_territory_decrease_factor: 0.80  # territory budget can fall max 20% per planning cycle
  # Tighter than channel corridors: field infrastructure (reps, speaker KOLs, agency
  # relationships) can't be redeployed across geographies as fast as media line-items.

# ── Geo / territory settings ────────────────────────────────
# market_size  : relative baseline NRx (index, not absolute)
# spend_share  : fraction of national budget allocated to this territory
# hcp_mult     : HCP channel ROI multiplier (>1 = more responsive than national avg)
# dtc_mult     : DTC channel ROI multiplier
# season_str   : vaccine seasonality strength (1.0 = national average)
territories:
  northeast:
    label: "Northeast"
    abbr: "NE"
    states: ["NY", "PA", "NJ", "MA", "CT", "RI", "NH", "VT", "ME"]
    market_size: 2200
    spend_share: 0.22
    hcp_mult: 1.20    # academic medical centres, high KOL density
    dtc_mult: 0.90
    season_str: 0.90
  southeast:
    label: "Southeast"
    abbr: "SE"
    states: ["FL", "GA", "SC", "NC", "VA", "TN", "AL", "MS", "AR", "LA"]
    market_size: 1900
    spend_share: 0.18
    hcp_mult: 0.90
    dtc_mult: 1.15    # higher TV consumption, strong DTC pull-through
    season_str: 0.65  # milder winters, weaker flu season
  midwest:
    label: "Midwest"
    abbr: "MW"
    states: ["OH", "IN", "IL", "MI", "WI", "MN", "IA", "MO", "ND", "SD", "NE", "KS"]
    market_size: 1800
    spend_share: 0.20
    hcp_mult: 1.00    # national benchmark
    dtc_mult: 1.00
    season_str: 1.10  # cold winters = stronger flu season
  southwest:
    label: "Southwest"
    abbr: "SW"
    states: ["TX", "OK", "NM", "AZ"]
    market_size: 1500
    spend_share: 0.16
    hcp_mult: 0.85    # lower HCP density per capita
    dtc_mult: 1.05
    season_str: 0.70
  mountain:
    label: "Mountain"
    abbr: "MT"
    states: ["CO", "UT", "WY", "MT", "ID", "NV"]
    market_size: 800
    spend_share: 0.08
    hcp_mult: 0.95
    dtc_mult: 0.80    # fragmented media market
    season_str: 1.20  # cold, high altitude = strong flu season
  pacific:
    label: "Pacific"
    abbr: "PC"
    states: ["CA", "OR", "WA", "AK", "HI"]
    market_size: 2100
    spend_share: 0.16
    hcp_mult: 1.10    # integrated health systems, high digital HCP adoption
    dtc_mult: 1.20    # strong digital DTC market
    season_str: 0.65  # mild Pacific coast climate

# ── Report settings ─────────────────────────────────────────
report:
  output_dir: reports/
  format: html                # html | pdf
  include_charts: true
  include_budget_table: true
  include_narrative: true
  pharma_brand_name: "VaxBrand"   # replace with your brand name